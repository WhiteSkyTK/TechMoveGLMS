name: TechMove GLMS — CI Pipeline

# Trigger: runs on every push to main/master AND on every pull request
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build & Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. Install .NET 9 SDK
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      # 3. Restore all NuGet packages
      - name: Restore dependencies
        run: dotnet restore

      # 4. Build the entire solution in Release mode
      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      # 5. Run the xUnit test project and report results
      - name: Run unit tests
        run: >
          dotnet test
          --no-build
          --configuration Release
          --verbosity normal
          --logger "trx;LogFileName=TestResults.trx"

      # 6. Upload the test results as a build artifact (optional but professional)
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()   # upload even if tests fail, so you can see what went wrong
        with:
          name: test-results
          path: "**/TestResults/*.trx"
          retention-days: 14
